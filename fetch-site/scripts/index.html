<!DOCTYPE html>
<html lang="en">
<body>
<script>
window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const { url } = JSON.parse(data);
    if (!url) return JSON.stringify({ error: "No URL provided." });

    const response = await fetch(url);
    const htmlText = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");

    // Nuke heavy, non-content elements
    doc.querySelectorAll("script, style, nav, footer, header, svg, noscript").forEach(el => el.remove());

    // Extract remaining text, collapse whitespace, and hard limit to ~8000 chars
    const content = doc.body.textContent.replace(/\s+/g, ' ').trim().substring(0, 8000);

    return JSON.stringify({ url, content });
  } catch (err) {
    return JSON.stringify({ error: err.message });
  }
};
</script>
</body>
</html>
