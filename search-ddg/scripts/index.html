<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window["ai_edge_gallery_get_result"] = async (data) => {
  try {
    const { query } = JSON.parse(data);
    if (!query) return JSON.stringify({ error: "No query provided." });

    const targetUrl = `https://html.duckduckgo.com/html/?q=${encodeURIComponent(query)}`;
    const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`;
    const response = await fetch(proxyUrl);
    if (!response.ok) {
      return JSON.stringify({ error: `Proxy request via corsproxy.io for ${new URL(targetUrl).host} failed with status ${response.status}.` });
    }
    const htmlText = await response.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");

    const results = Array.from(doc.querySelectorAll('.result__snippet'))
      .map(el => (el.textContent || "").trim())
      .filter(text => text)
      .slice(0, 5);

    return JSON.stringify(results.length ? { query, results } : { error: "No results found." });
  } catch (err) {
    const errorMessage = err instanceof Error ? err.message : String(err);
    return JSON.stringify({ error: errorMessage });
  }
};
</script>
</body>
</html>
